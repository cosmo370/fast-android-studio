name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run package:win
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            packages/Fast-Android-Studio-Setup-*.exe
            packages/Fast-Android-Studio-Setup-*.exe.blockmap
